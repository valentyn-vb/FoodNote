services:
  db:
    image: postgres:18-alpine
    container_name: foodnote-db
    environment:
      POSTGRES_USER: foodnote
      POSTGRES_PASSWORD: foodnote
      POSTGRES_DB: foodnote
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U foodnote -d foodnote']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
